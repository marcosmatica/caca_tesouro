<!-- templates/equipes/login.html -->
{% extends 'equipes/base.html' %}

{% block title %}Login - Caça ao Tesouro{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h1 class="login-title">🎯 Caça ao Tesouro</h1>
        <p class="login-subtitle">Entre com sua equipe</p>

        <form method="post" class="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username" class="form-label">Nome da Equipe</label>
                <input type="text" id="username" name="username" class="form-input" required autofocus>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-full">Entrar na Aventura</button>
        </form>

        {% if form.errors %}
        <div class="alert alert-error">
            Credenciais inválidas. Tente novamente.
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
